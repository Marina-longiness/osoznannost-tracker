<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Осознанность · трекер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#E4E5DF;
      --lime:#D6F24B;
      --lime-soft:#EAF9A8;
      --ink:#151515;
      --card:#FFFFFF;
      --dark:#161616;
      --muted:#8C8F86;
      --line:#ECECE8;
      --radius:26px;
      --radius-sm:18px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      background:var(--tg-theme-bg-color,var(--bg));
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      min-height:100vh;
    }
    .app{max-width:520px;margin:0 auto;padding:16px 14px 96px;}
    .screen{display:none;}
    .screen.active{display:block;animation:fade .25s ease;}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    /* header */
    .top{display:flex;align-items:center;justify-content:space-between;margin:4px 4px 16px;}
    .hi h1{font-size:22px;font-weight:800;margin:0;letter-spacing:-.5px;}
    .hi p{margin:2px 0 0;color:var(--muted);font-size:13px;}
    .chips-row{display:flex;gap:8px;}
    .chip{
      display:inline-flex;align-items:center;gap:6px;background:var(--card);
      border-radius:999px;padding:9px 13px;font-size:13px;font-weight:700;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }
    .chip .val{font-weight:800;}
    .chip.lime{background:var(--lime);}

    /* cards */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    .card{border-radius:var(--radius);padding:18px;}
    .card.dark{background:var(--dark);color:#fff;}
    .card.lime{background:var(--lime);color:var(--ink);}
    .card.white{background:var(--card);box-shadow:0 4px 18px rgba(0,0,0,.05);}
    .card-label{font-size:12px;font-weight:700;opacity:.7;margin:0 0 10px;text-transform:none;letter-spacing:.2px;}
    .kcal-num{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1;}
    .kcal-num small{font-size:14px;font-weight:600;opacity:.55;}
    .macros{margin-top:12px;font-size:13.5px;font-weight:700;color:rgba(255,255,255,.72);}
    .macros small{opacity:.55;}
    .bar{height:8px;border-radius:999px;background:rgba(255,255,255,.16);margin-top:14px;overflow:hidden;}
    .bar.on-light{background:rgba(0,0,0,.08);}
    .bar > i{display:block;height:100%;border-radius:999px;background:var(--lime);transition:width .4s ease;}
    .bar.on-light > i{background:var(--ink);}
    .emo-sum{font-size:14.5px;font-weight:600;line-height:1.4;}
    .emo-hint{font-size:12px;color:rgba(0,0,0,.55);margin-top:10px;font-weight:600;}

    /* fasting compact */
    .fast{display:flex;align-items:center;gap:16px;margin-bottom:12px;}
    .ring{position:relative;width:64px;height:64px;flex:0 0 64px;border-radius:50%;
      background:conic-gradient(var(--lime) var(--p,0deg), #EEE 0deg);}
    .ring:after{content:'';position:absolute;inset:7px;border-radius:50%;background:var(--card);}
    .ring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:800;z-index:1;}
    .fast .fx{flex:1;}
    .fast .fx .t{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:3px;}
    .fast .fx .v{font-size:19px;font-weight:800;letter-spacing:-.5px;}
    .fast .fx .s{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:600;}

    /* tip */
    .tip{position:relative;overflow:hidden;margin-bottom:16px;}
    .tip:before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--lime);}
    .tip .lab{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px;}
    .tip .txt{font-size:14.5px;line-height:1.45;font-weight:600;padding-right:4px;}
    .tip .more{margin-top:12px;background:transparent;border:none;color:var(--ink);font-weight:800;
      font-size:13px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:0;}
    .tip .more span{width:22px;height:22px;border-radius:50%;background:var(--lime);display:inline-flex;
      align-items:center;justify-content:center;font-size:13px;}

    /* section head */
    .sec-h{display:flex;align-items:center;justify-content:space-between;margin:4px 6px 12px;}
    .sec-h h2{font-size:19px;font-weight:800;margin:0;letter-spacing:-.4px;}
    .sec-h .cnt{font-size:12px;color:var(--muted);font-weight:700;}

    /* feed */
    .feed{display:flex;flex-direction:column;gap:10px;}
    .row{background:var(--card);border-radius:var(--radius-sm);padding:14px 15px;box-shadow:0 2px 12px rgba(0,0,0,.04);
      position:relative;}
    .row .del{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;border:none;
      background:#F3F3EF;color:#B0B0A8;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .row.meal{cursor:pointer;}
    .row .r-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding-right:26px;}
    .row .r-name{font-size:15px;font-weight:800;}
    .row .r-time{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;}
    .row .r-kcal{font-size:13px;font-weight:800;color:var(--ink);}
    .row .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
    .tag{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;background:#F4F4EF;color:#5C5F57;}
    .tag.hot{background:var(--lime-soft);color:#4a5a12;}
    .tag.emo{background:#F0F1EA;}
    .row.urge{background:var(--dark);color:#fff;}
    .row.urge .r-name{color:#fff;}
    .row.urge .r-time{color:rgba(255,255,255,.5);}
    .row.urge .del{background:rgba(255,255,255,.12);color:rgba(255,255,255,.6);}
    .row.urge .stopmark{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;
      color:var(--lime);letter-spacing:.4px;text-transform:uppercase;margin-bottom:7px;}
    .row.urge .tag{background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);}

    .empty{background:var(--card);border-radius:var(--radius-sm);padding:26px 18px;text-align:center;color:var(--muted);
      font-size:13.5px;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,.04);}

    /* progress tab */
    .block{margin-bottom:14px;}
    .p-card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:0 4px 18px rgba(0,0,0,.05);}
    .p-card.dark{background:var(--dark);color:#fff;}
    .p-title{font-size:13px;font-weight:800;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
    .seg{display:flex;gap:8px;flex-wrap:wrap;}
    .seg button{border:none;background:#F3F3EF;color:#63665e;font-weight:800;font-size:13px;
      padding:10px 14px;border-radius:999px;cursor:pointer;}
    .seg button.on{background:var(--lime);color:var(--ink);}
    .big-fast{font-size:34px;font-weight:800;letter-spacing:-1px;margin:6px 0 2px;}
    .sub{color:var(--muted);font-size:12.5px;font-weight:700;}
    .p-card.dark .sub{color:rgba(255,255,255,.55);}
    .days{display:flex;gap:7px;margin-top:16px;}
    .days .d{flex:1;text-align:center;}
    .days .d .dot{width:100%;aspect-ratio:1;border-radius:14px;background:#F0F0EB;display:flex;align-items:center;
      justify-content:center;font-size:12px;font-weight:800;color:#B4B4AC;}
    .days .d.hit .dot{background:var(--lime);color:var(--ink);}
    .days .d .dl{font-size:10px;color:var(--muted);margin-top:5px;font-weight:700;}
    .act-total{display:flex;align-items:flex-end;gap:8px;margin:2px 0 4px;}
    .act-total b{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1;}
    .act-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
    .act-item{display:flex;align-items:center;justify-content:space-between;background:#F7F7F3;border-radius:14px;padding:11px 13px;}
    .act-item .al{font-weight:700;font-size:14px;}
    .act-item .ar{font-weight:800;font-size:13px;color:var(--muted);}
    .add-mini{margin-top:14px;width:100%;border:none;background:var(--ink);color:#fff;font-weight:800;font-size:14px;
      padding:13px;border-radius:16px;cursor:pointer;}
    .pts-row{display:flex;gap:12px;}
    .pts-box{flex:1;background:#F7F7F3;border-radius:18px;padding:15px;text-align:center;}
    .pts-box b{font-size:26px;font-weight:800;display:block;letter-spacing:-1px;}
    .pts-box.lime{background:var(--lime);}
    .pts-box span{font-size:11.5px;color:var(--muted);font-weight:700;}
    .pts-box.lime span{color:#546016;}
    .rules{margin:14px 0 0;padding:14px;background:#F7F7F3;border-radius:16px;}
    .rules p{margin:0 0 8px;font-size:12.5px;font-weight:700;color:#5C5F57;}
    .rules p:last-child{margin:0;}
    .rules .no{color:#B0665C;}

    /* action bar + nav */
    .actionbar{position:sticky;top:0;z-index:30;display:flex;gap:10px;
      padding:10px 0 12px;margin-bottom:4px;background:var(--tg-theme-bg-color,var(--bg));}
    .actionbar button{flex:1;border:none;border-radius:18px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);}
    .btn-meal{background:var(--lime);color:var(--ink);flex:1.6;}
    .btn-stop{background:var(--dark);color:#fff;}
    .btn-stop b{color:var(--lime);}
    .nav{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--card);
      border-top:1px solid var(--line);display:flex;padding:8px 14px calc(8px + env(safe-area-inset-bottom));z-index:41;}
    .nav button{flex:1;border:none;background:transparent;padding:10px;border-radius:14px;font-weight:800;font-size:13.5px;
      color:var(--muted);cursor:pointer;}
    .nav button.on{background:var(--lime);color:var(--ink);}

    /* modal */
    .overlay{position:fixed;inset:0;background:rgba(20,20,18,.5);backdrop-filter:blur(2px);z-index:100;display:none;
      align-items:flex-end;justify-content:center;}
    .overlay.open{display:flex;animation:fade .2s ease;}
    .sheet{background:var(--bg);width:100%;max-width:520px;border-radius:28px 28px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));
      max-height:92vh;overflow-y:auto;animation:up .28s cubic-bezier(.2,.8,.2,1);}
    @keyframes up{from{transform:translateY(40px)}to{transform:none}}
    .sheet h3{margin:0 0 4px;font-size:20px;font-weight:800;letter-spacing:-.4px;}
    .sheet .lead{color:var(--muted);font-size:13.5px;font-weight:600;margin:0 0 18px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:12.5px;font-weight:800;margin-bottom:9px;color:#5C5F57;}
    .field label .req{color:#B0665C;}
    input[type=text],input[type=number],input[type=time]{width:100%;border:none;background:var(--card);border-radius:14px;padding:14px;
      font-size:15px;font-weight:600;font-family:inherit;outline:none;}
    .chipset{display:flex;flex-wrap:wrap;gap:8px;}
    .ch{border:none;background:var(--card);border-radius:999px;padding:10px 14px;font-size:13.5px;font-weight:700;
      cursor:pointer;color:#4a4d45;transition:.15s;}
    .ch.sel{background:var(--lime);color:var(--ink);}
    .ch.dark-sel.sel{background:var(--ink);color:#fff;}
    .sheet-actions{display:flex;gap:10px;margin-top:8px;}
    .sheet-actions button{flex:1;border:none;border-radius:16px;padding:15px;font-weight:800;font-size:15px;cursor:pointer;}
    .b-primary{background:var(--ink);color:#fff;}
    .b-ghost{background:transparent;color:var(--muted);flex:.6;}
    .b-lime{background:var(--lime);color:var(--ink);}
    .big-choice{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
    .big-choice button{border:none;border-radius:20px;padding:20px;text-align:left;cursor:pointer;font-family:inherit;}
    .big-choice .bc1{background:var(--lime);color:var(--ink);}
    .big-choice .bc2{background:var(--ink);color:#fff;}
    .big-choice b{font-size:17px;font-weight:800;display:block;}
    .big-choice small{font-size:13px;opacity:.7;font-weight:600;display:block;margin-top:4px;}
    .pause{background:var(--dark);color:#fff;border-radius:20px;padding:20px;text-align:center;margin-bottom:16px;}
    .pause .breathe{width:70px;height:70px;border-radius:50%;background:var(--lime);margin:6px auto 12px;
      animation:breathe 4s ease-in-out infinite;}
    @keyframes breathe{0%,100%{transform:scale(.7);opacity:.7}50%{transform:scale(1);opacity:1}}
    .pause p{margin:0;font-size:14px;font-weight:600;line-height:1.4;}
    .err{color:#B0665C;font-size:12.5px;font-weight:700;margin-top:6px;display:none;}

    /* fallback */
    .fallback{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
    .fallback .ic{width:64px;height:64px;border-radius:20px;background:var(--lime);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:16px;}
    .fallback h3{font-size:18px;font-weight:800;margin:0 0 8px;}
    .fallback p{color:var(--muted);font-size:14px;font-weight:600;margin:0 0 18px;max-width:300px;line-height:1.4;}
    .fallback button{border:none;background:var(--ink);color:#fff;font-weight:800;padding:14px 22px;border-radius:16px;font-size:14px;cursor:pointer;}
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <!-- bottom nav -->
  <div class="nav" id="nav" style="display:none">
    <button id="nav-today" class="on" onclick="switchTab('today')">Сегодня</button>
    <button id="nav-progress" onclick="switchTab('progress')">Прогресс</button>
  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet" id="sheet"></div>
  </div>

<script>
"use strict";
const KEY='emoEatState_v1';
const API='https://80-90-179-3.sslip.io';
function apiPost(e){try{fetch(API+'/entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});}catch(x){}}
function apiDel(id){try{fetch(API+'/entries?id='+encodeURIComponent(id),{method:'DELETE'});}catch(x){}}
let DATA=null;
let state={entries:[],protocol:null};
let tab='today';
let tipIndex=0;
let editingId=null;

/* ---------- Telegram ---------- */
try{ if(window.Telegram&&Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); } }catch(e){}

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
const uid=()=>'e'+Date.now()+Math.floor(Math.random()*1e6);
const two=n=>String(n).padStart(2,'0');
function nowHHMM(){var d=new Date();return two(d.getHours())+':'+two(d.getMinutes());}
function tsFrom(day,hhmm){var d=new Date();if(day==='yesterday')d.setDate(d.getDate()-1);if(hhmm&&/^\d{1,2}:\d{2}$/.test(hhmm)){var pp=hhmm.split(':');d.setHours(+pp[0],+pp[1],0,0);}return d.getTime();}
function fmtTime(ts){const d=new Date(ts);return two(d.getHours())+':'+two(d.getMinutes());}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+two(d.getMonth()+1)+'-'+two(d.getDate());}
function isToday(ts){return dayKey(ts)===dayKey(Date.now());}
function timeBucket(ts){const h=new Date(ts).getHours();return h<12?'утром':h<18?'днём':'вечером';}
const emo=id=>DATA.emotions.find(e=>e.id===id)||{label:id,emoji:''};
const hun=id=>DATA.hungerLevels.find(e=>e.id===id)||{label:id,physical:true};
const inten=id=>(DATA.intensities.find(e=>e.id===id)||{label:id}).label;
const act=id=>DATA.activityTypes.find(e=>e.id===id)||{label:id,emoji:''};

/* ---------- storage ---------- */
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function seed(){
  const now=Date.now();
  state.entries=(DATA.sampleEntries||[]).map(s=>{
    const e={id:uid(),ts:now-(s.minutesAgo||0)*60000,type:s.type};
    if(s.type==='meal'){e.name=s.name;e.calories=(s.calories??null);e.emotion=s.emotion;e.intensity=s.intensity;e.hunger=s.hunger;}
    if(s.type==='urge'){e.subtype=s.subtype;e.emotion=s.emotion;e.intensity=s.intensity;e.outcome=s.outcome;e.context=s.context||null;}
    if(s.type==='activity'){e.activityType=s.activityType;e.minutes=s.minutes;}
    return e;
  });
  state.protocol=Object.assign({},DATA.fastingProtocol);
  save();
}

/* ---------- computed ---------- */
const todayEntries=()=>state.entries.filter(e=>isToday(e.ts)).sort((a,b)=>b.ts-a.ts);
const todayMeals=()=>todayEntries().filter(e=>e.type==='meal');
const todayUrges=()=>todayEntries().filter(e=>e.type==='urge');
const todayActs=()=>todayEntries().filter(e=>e.type==='activity');
function caloriesToday(){return todayMeals().reduce((s,e)=>s+(Number(e.calories)||0),0);}
function macroToday(k){return todayMeals().reduce((s,e)=>s+(Number(e[k])||0),0);}
function entryBurned(e){if(e.burned!=null&&e.burned!=='')return Number(e.burned)||0;var rate={walk:4,run:10,workout:8,yoga:3,stretch:2};if(Number(e.steps))return Math.round(Number(e.steps)*0.04);if(Number(e.minutes))return Math.round(Number(e.minutes)*(rate[e.activityType]||4));return 0;}
function burnedToday(){return todayActs().reduce((s,e)=>s+entryBurned(e),0);}
function waterToday(){return todayEntries().filter(e=>e.type==='water').reduce((s,e)=>s+(Number(e.ml)||0),0);}
function addWater(ml){var e={id:uid(),ts:Date.now(),type:'water',ml:ml};state.entries.push(e);apiPost(e);save();render();haptic();}
function stepsToday(){return todayActs().reduce((s,e)=>s+(Number(e.steps)||0),0);}
function motivText(m,g){if(m<=0)return 'Начни двигаться — даже 5 минут считаются 💪';if(m<g)return 'Ещё '+(g-m)+' мин до цели дня 🎯';return 'Цель дня достигнута! Ты супер 🎉';}
function lastMealTs(){const m=state.entries.filter(e=>e.type==='meal').sort((a,b)=>b.ts-a.ts);return m.length?m[0].ts:null;}
function entryPoints(e){
  if(e.type==='meal')return DATA.pointsRules.meal;
  if(e.type==='activity')return DATA.pointsRules.activity;
  if(e.type==='urge')return e.outcome==='resisted'?DATA.pointsRules.urgeResisted:DATA.pointsRules.urgeLogged;
  return 0;
}
const totalPoints=()=>state.entries.reduce((s,e)=>s+entryPoints(e),0);
const todayPoints=()=>todayEntries().reduce((s,e)=>s+entryPoints(e),0);
function streakDays(){
  const days=new Set(state.entries.map(e=>dayKey(e.ts)));
  let s=0;const d=new Date();
  while(days.has(dayKey(d.getTime()))){s++;d.setDate(d.getDate()-1);}
  return s;
}
function emotionSummary(){
  const meals=todayMeals(),urges=todayUrges();
  const rel=meals.concat(urges);
  if(rel.length<2)return null;
  const noH=meals.filter(e=>!hun(e.hunger).physical);
  const pool=noH.length?noH:rel;
  const ec={};pool.forEach(e=>ec[e.emotion]=(ec[e.emotion]||0)+1);
  const topEmo=Object.keys(ec).sort((a,b)=>ec[b]-ec[a])[0];
  const tb={утром:0,днём:0,вечером:0};pool.forEach(e=>tb[timeBucket(e.ts)]++);
  const topTime=Object.keys(tb).sort((a,b)=>tb[b]-tb[a])[0];
  return {total:meals.length,nh:noH.length,topEmo,topTime};
}
function fastingInfo(){
  const start=state.fastingStart||lastMealTs();
  const goalMs=(state.protocol.fastingHours)*3600000;
  if(!start)return{none:true,goalMs};
  const el=Date.now()-start;
  return{none:false,el,goalMs,done:el>=goalMs};
}
function dur(ms){const m=Math.max(0,Math.floor(ms/60000));return Math.floor(m/60)+'ч '+two(m%60)+'м';}

/* ================= RENDER ================= */
function render(){
  if(!DATA)return;
  $('app').innerHTML = tab==='today'?renderToday():renderProgress();
  $('nav-today').className=tab==='today'?'on':'';
  $('nav-progress').className=tab==='progress'?'on':'';
}

function renderToday(){
  const kc=caloriesToday(),norm=DATA.dailyCalorieNorm;
  const pct=Math.min(100,Math.round(kc/norm*100));
  const es=emotionSummary();
  const f=fastingInfo();
  let fastMid='',fastSub='',pdeg=0;
  if(f.none){fastMid='старт';fastSub='Запиши первый приём пищи';}
  else{const p=Math.min(1,f.el/f.goalMs);pdeg=Math.round(p*360);fastMid=Math.round(p*100)+'%';
    fastSub=f.done?'Окно можно открывать':'Цель · '+state.protocol.fastingHours+'ч';}
  const feed=todayEntries().filter(e=>e.type!=='activity');

  return `
    <div class="top">
      <div class="hi"><h1>Привет 👋</h1><p>${new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'})}</p></div>
      <div class="chips-row">
        <div class="chip lime"><span>⭑</span><span class="val">${totalPoints()}</span></div>
        <div class="chip"><span>🔥</span><span class="val">${streakDays()}</span></div>
      </div>
    </div>

    <div class="actionbar">
      <button class="btn-meal" onclick="openMeal()">+ Приём пищи</button>
      <button class="btn-stop" onclick="openStop()">Стоп-<b>кран</b></button>
    </div>

    <div class="grid2">
      <div class="card dark">
        <p class="card-label">Калории сегодня</p>
        <div class="kcal-num">${kc}<small> / ${norm}</small></div>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <div class="macros">Б ${Math.round(macroToday('protein'))} · Ж ${Math.round(macroToday('fat'))} · У ${Math.round(macroToday('carbs'))} <small>г</small></div>
        <div class="macros">🔥 Потрачено ${Math.round(burnedToday())} · Баланс ${kc-Math.round(burnedToday())} <small>ккал</small></div>
      </div>
      <div class="card lime">
        <p class="card-label">Эмоции и еда</p>
        ${es?`<div class="emo-sum">${es.nh>0?`${es.nh} из ${es.total} раз без голода — чаще ${es.topTime}, на «${emo(es.topEmo).label}»`:`Сегодня еда шла по голоду — так держать 🌿`}</div>`
             :`<div class="emo-hint" style="color:rgba(0,0,0,.6)">Пока мало записей для вывода</div>`}
      </div>
    </div>

    <div class="card white fast">
      <div class="ring" style="--p:${pdeg}deg"><b>${fastMid}</b></div>
      <div class="fx">
        <div class="t">Интервальное голодание</div>
        <div class="v">${f.none?'—':dur(f.el)}</div>
        <div class="s">${fastSub}</div>
      </div>
    </div>

    <div class="card white" style="display:flex;align-items:center;gap:14px">
      <div style="font-size:30px">💧</div>
      <div style="flex:1">
        <div style="font-size:20px;font-weight:800;letter-spacing:-.5px">${Math.round(waterToday()/250)} / ${Math.round((DATA.waterGoalMl||2000)/250)} <span style="font-size:13px;color:var(--muted);font-weight:700">стаканов</span></div>
        <div class="bar on-light" style="margin-top:8px"><i style="width:${Math.min(100,Math.round(waterToday()/(DATA.waterGoalMl||2000)*100))}%"></i></div>
      </div>
      <button class="add-mini" style="width:auto;padding:0 16px;margin:0" onclick="addWater(250)">+ стакан</button>
    </div>

    <div class="card white tip">
      <div class="lab">Совет</div>
      <div class="txt">${DATA.tips[tipIndex]}</div>
      <button class="more" onclick="nextTip()"><span>↻</span> Другой совет</button>
    </div>

    <div class="sec-h"><h2>Сегодня</h2><span class="cnt">${feed.length} ${plural(feed.length,'запись','записи','записей')}</span></div>
    <div class="feed">
      ${feed.length?feed.map(rowHTML).join(''):`<div class="empty">Сегодня ещё ничего не записано.<br>Начни с первой записи ниже 👇</div>`}
    </div>`;
}

function rowHTML(e){
  if(e.type==='urge'){
    const isBefore=e.subtype==='before';
    const title=e.outcome==='resisted'?'Переждал(а) порыв':'Эпизод отмечен';
    const sub=isBefore?'До еды':'За столом';
    return `<div class="row urge">
      <button class="del" onclick="del('${e.id}')">✕</button>
      <div class="stopmark">⚡ Стоп-кран · ${sub}</div>
      <div class="r-top"><div class="r-name">${title}</div><div class="r-time">${fmtTime(e.ts)}</div></div>
      <div class="tags">
        ${(e.emotions&&e.emotions.length?e.emotions:[e.emotion]).filter(Boolean).map(id=>`<span class="tag">${emo(id).emoji} ${emo(id).label}</span>`).join('')}
        <span class="tag">${inten(e.intensity)}</span>
        ${e.context?`<span class="tag">${escapeHtml(e.context)}</span>`:''}
      </div></div>`;
  }
  const h=hun(e.hunger);
  return `<div class="row meal" onclick="if(!event.target.classList.contains('del'))editMeal('${e.id}')">
    <button class="del" onclick="del('${e.id}')">✕</button>
    <div class="r-top">
      <div class="r-name">${escapeHtml(e.name||'Приём пищи')}</div>
      <div class="r-time">${e.calories!=null&&e.calories!==''?`<span class="r-kcal">${e.calories} ккал</span> · `:''}${fmtTime(e.ts)}</div>
    </div>
    <div class="tags">
      <span class="tag ${h.physical?'':'hot'}">${h.physical?'🍽 '+h.label:'⚠ '+h.label}</span>
      ${(e.emotions&&e.emotions.length?e.emotions:[e.emotion]).filter(Boolean).map(id=>`<span class="tag emo">${emo(id).emoji} ${emo(id).label}</span>`).join('')}
      <span class="tag">${inten(e.intensity)}</span>
    </div>${e.note?`<div style="margin-top:8px;font-size:12.5px;color:var(--muted);font-style:italic;line-height:1.35">💭 ${escapeHtml(e.note)}</div>`:''}</div>`;
}

function renderProgress(){
  const f=fastingInfo();
  const protos=[[16,8],[14,10],[18,6],[12,12]];
  // 7-day dots
  const days=[];const dd=new Date();dd.setDate(dd.getDate()-6);
  const has=new Set(state.entries.map(e=>dayKey(e.ts)));
  const wd=['вс','пн','вт','ср','чт','пт','сб'];
  for(let i=0;i<7;i++){const k=dayKey(dd.getTime());days.push({n:dd.getDate(),l:wd[dd.getDay()],hit:has.has(k)});dd.setDate(dd.getDate()+1);}
  const acts=todayActs();
  const amin=acts.reduce((s,e)=>s+(Number(e.minutes)||0),0);
  const goal=DATA.activityGoalMinutes;
  const actSet=new Set(state.entries.filter(e=>e.type==='activity').map(e=>dayKey(e.ts)));
  let actDaysHTML='';{const dda=new Date();dda.setDate(dda.getDate()-6);for(let i=0;i<7;i++){const k=dayKey(dda.getTime());const hit=actSet.has(k);actDaysHTML+=`<div class="d ${hit?'hit':''}"><div class="dot">${hit?'🔥':dda.getDate()}</div><div class="dl">${wd[dda.getDay()]}</div></div>`;dda.setDate(dda.getDate()+1);}}

  return `
    <div class="top"><div class="hi"><h1>Прогресс</h1><p>Голодание · активность · осознанность</p></div></div>

    <div class="block"><div class="p-card">
      <p class="p-title">🕒 Интервальное голодание</p>
      <div class="seg">${protos.map(p=>`<button class="${state.protocol.fastingHours==p[0]?'on':''}" onclick="setProto(${p[0]},${p[1]})">${p[0]}:${p[1]}</button>`).join('')}</div>
      <div class="seg" style="margin-top:10px">
        <button class="${state.fastingStart?'on':''}" onclick="startFast()">▶ Начать</button>
        <button onclick="resetFast()">⏹ Закончить</button>
      </div>
      <div class="sub" style="margin-top:8px">${state.fastingStart?'Голодание запущено вручную':'Идёт от последнего приёма пищи. Можно задать вручную ниже.'}</div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #EEE">
        <div class="sub" style="margin-bottom:8px">Задать начало голодания вручную:</div>
        <div class="chipset" data-group="fday" style="margin-bottom:8px">
          <button type="button" class="ch sel" data-val="today" onclick="pick(this)">Сегодня</button>
          <button type="button" class="ch" data-val="yesterday" onclick="pick(this)">Вчера</button>
        </div>
        <div style="display:flex;gap:8px">
          <input type="time" id="f-time" value="${state.fastingStart?fmtTime(state.fastingStart):nowHHMM()}" style="flex:1">
          <button class="add-mini" style="width:auto;padding:0 18px;margin:0" onclick="setFastStart()">Задать</button>
        </div>
      </div>
      <div class="big-fast">${f.none?'—':dur(f.el)}</div>
      <div class="sub">${f.none?'Пока нет приёмов пищи':(f.done?'Цель '+state.protocol.fastingHours+'ч достигнута · окно открыто':'Идёт голодание · цель '+state.protocol.fastingHours+'ч')}</div>
      <div class="days">${days.map(d=>`<div class="d ${d.hit?'hit':''}"><div class="dot">${d.n}</div><div class="dl">${d.l}</div></div>`).join('')}</div>
      <div class="sub" style="margin-top:10px">Дни с записями за неделю</div>
    </div></div>

    <div class="block"><div class="p-card">
      <p class="p-title">🏃 Активность сегодня</p>
      <div style="display:flex;align-items:center;gap:18px;margin:8px 0 6px">
        <div class="ring" style="--p:${Math.min(360,Math.round(amin/goal*360))}deg;width:94px;height:94px;flex:0 0 94px">
          <b style="font-size:15px">${Math.min(100,Math.round(amin/goal*100))}%</b>
        </div>
        <div style="flex:1">
          <div style="font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1">🔥 ${Math.round(burnedToday())} <span style="font-size:13px;font-weight:700;color:var(--muted)">ккал</span></div>
          <div class="sub" style="margin-top:5px">${amin} / ${goal} мин${stepsToday()?` · ${stepsToday()} шагов`:''}</div>
          <div style="margin-top:9px;font-size:13.5px;font-weight:800;color:${amin>=goal?'#4a5a12':'var(--ink)'}">${motivText(amin,goal)}</div>
        </div>
      </div>
      <div class="days" style="margin-top:4px">${actDaysHTML}</div>
      <div class="sub" style="margin-top:8px">🔥 — активные дни за неделю</div>
      <div class="act-list" style="margin-top:14px">${acts.length?acts.map(a=>`<div class="act-item"><span class="al">${act(a.activityType).emoji} ${act(a.activityType).label}</span><span class="ar">${a.steps?a.steps+' шагов':(a.minutes+' мин')}${entryBurned(a)?' · '+entryBurned(a)+' ккал':''} · ${fmtTime(a.ts)}</span></div>`).join(''):'<div class="sub" style="text-align:center;padding:10px">Сегодня активности пока нет — начни с 5 минут 💪</div>'}</div>
      <button class="add-mini" onclick="openActivity()">+ Добавить активность</button>
    </div></div>

    <div class="block"><div class="p-card">
      <p class="p-title">⭑ Баллы за осознанность</p>
      <div class="pts-row">
        <div class="pts-box lime"><b>${totalPoints()}</b><span>всего</span></div>
        <div class="pts-box"><b>${todayPoints()}</b><span>сегодня</span></div>
        <div class="pts-box"><b>${streakDays()}</b><span>дней подряд</span></div>
      </div>
      <div class="rules">
        <p>+${DATA.pointsRules.meal} — записал приём пищи с эмоцией и голодом</p>
        <p>+${DATA.pointsRules.urgeResisted} — «Стоп-кран», переждал(а) порыв</p>
        <p>+${DATA.pointsRules.urgeLogged} — отметил(а) эпизод за столом</p>
        <p>+${DATA.pointsRules.activity} — добавил(а) активность</p>
        <p class="no">Баллы — только за осознанность, не за «мало съел» или голодание.</p>
      </div>
    </div></div>
    <div class="block"><button class="add-mini" onclick="wipeAll()">↻ Обновить из сервера</button></div>`;
}

function plural(n,a,b,c){const m=n%100;if(m>=11&&m<=14)return c;const l=n%10;return l===1?a:(l>=2&&l<=4?b:c);}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* ================= ACTIONS ================= */
function switchTab(t){tab=t;render();window.scrollTo(0,0);}
function nextTip(){tipIndex=(tipIndex+Math.floor(Math.random()*(DATA.tips.length-1))+1)%DATA.tips.length;render();}
function del(id){state.deleted=state.deleted||[];state.deleted.push(id);apiDel(id);state.entries=state.entries.filter(e=>e.id!==id);save();render();haptic();}
function setProto(f,e){state.protocol={fastingHours:f,eatingHours:e};save();render();}
function startFast(){state.fastingStart=Date.now();save();render();haptic();}
function resetFast(){state.fastingStart=null;save();render();haptic();}
function setFastStart(){var t=$('f-time')?$('f-time').value:'';state.fastingStart=tsFrom(getPick('fday')||'today',t);save();render();haptic();}
function haptic(){try{Telegram.WebApp.HapticFeedback.impactOccurred('light');}catch(e){}}
function wipeAll(){state.entries=[];state.deleted=[];save();syncFromServer();render();haptic();}

/* ---- modal core ---- */
function openModal(html){$('sheet').innerHTML=html;$('overlay').classList.add('open');}
function closeModal(){$('overlay').classList.remove('open');editingId=null;}
function chipset(items,name,darkSel,multi){
  return `<div class="chipset" data-group="${name}">${items.map(i=>`<button type="button" class="ch ${darkSel?'dark-sel':''}" data-val="${i.id}" onclick="${multi?'pickMulti(this,2)':'pick(this)'}">${i.emoji?i.emoji+' ':''}${i.label}</button>`).join('')}</div>`;
}
function pick(el){[...el.parentNode.children].forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
function pickMulti(el,max){if(el.classList.contains('sel')){el.classList.remove('sel');return;}var sels=el.parentNode.querySelectorAll('.sel');if(sels.length>=max){sels[0].classList.remove('sel');}el.classList.add('sel');}
function getPicks(group){return [...document.querySelectorAll(`[data-group="${group}"] .sel`)].map(x=>x.dataset.val);}
function preselectMulti(group,vals){(vals||[]).forEach(v=>{if(!v)return;var el=document.querySelector(`[data-group="${group}"] [data-val="${v}"]`);if(el)el.classList.add('sel');});}
function getPick(group){const g=document.querySelector(`[data-group="${group}"] .sel`);return g?g.dataset.val:null;}

/* ---- add / edit meal ---- */
function openMeal(prefill){
  editingId=null;
  mealSheet('Добавить приём пищи','Запиши, что съел(а) и что чувствовал(а).',prefill||{});
}
function editMeal(id){
  const e=state.entries.find(x=>x.id===id);if(!e)return;
  editingId=id;
  mealSheet('Поправить запись','',e);
}
function mealSheet(title,lead,v){
  openModal(`
    <h3>${title}</h3>${lead?`<p class="lead">${lead}</p>`:''}
    <div class="field"><label>Что съел(а)</label><input type="text" id="m-name" placeholder="Например, овсянка" value="${v.name?escapeHtml(v.name):''}"></div>
    <div class="field"><label>Голод до еды <span class="req">*</span></label>${chipset(DATA.hungerLevels,'hunger')}</div>
    <div class="field"><label>Эмоция <span class="req">*</span> <span style="color:#8C8F86;font-weight:600">(до 2)</span></label>${chipset(DATA.emotions,'emotion',false,true)}</div>
    <div class="field"><label>Интенсивность</label>${chipset(DATA.intensities,'intensity')}</div>
    <div class="field"><label>Калории (по желанию)</label><input type="number" id="m-kcal" inputmode="numeric" placeholder="можно пропустить" value="${v.calories!=null&&v.calories!==''?v.calories:''}">
      <div style="font-size:12px;color:#8C8F86;font-weight:600;margin-top:8px">💬 Не знаешь калории/КБЖУ? Напиши блюдо или пришли фото боту — он посчитает сам.</div></div>
    <div class="field"><label>КБЖУ (по желанию, граммы)</label>
      <div style="display:flex;gap:8px">
        <input type="number" id="m-prot" inputmode="numeric" placeholder="Белки" value="${v.protein!=null&&v.protein!==''?v.protein:''}">
        <input type="number" id="m-fat" inputmode="numeric" placeholder="Жиры" value="${v.fat!=null&&v.fat!==''?v.fat:''}">
        <input type="number" id="m-carb" inputmode="numeric" placeholder="Углев" value="${v.carbs!=null&&v.carbs!==''?v.carbs:''}">
      </div></div>
    <div class="field"><label>Заметка (мысли, ситуация) — по желанию</label><input type="text" id="m-note" placeholder="например: заела дедлайн" value="${v.note?escapeHtml(v.note):''}"></div>
    ${!editingId?`<div class="field"><label>Когда</label>
      <div class="chipset" data-group="mday" style="margin-bottom:8px">
        <button type="button" class="ch sel" data-val="today" onclick="pick(this)">Сегодня</button>
        <button type="button" class="ch" data-val="yesterday" onclick="pick(this)">Вчера</button>
      </div>
      <input type="time" id="m-time" value="${nowHHMM()}"></div>`:''}
    <div class="err" id="m-err">Отметь голод и эмоцию — это ядро записи.</div>
    <div class="sheet-actions">
      <button class="b-ghost" onclick="closeModal()">Отмена</button>
      <button class="b-lime" onclick="saveMeal()">Сохранить</button>
    </div>`);
  preselect('hunger',v.hunger);preselectMulti('emotion',v.emotions||(v.emotion?[v.emotion]:[]));preselect('intensity',v.intensity||'mid');
}
function preselect(group,val){if(!val)return;const el=document.querySelector(`[data-group="${group}"] [data-val="${val}"]`);if(el)pick(el);}
function saveMeal(){
  const hunger=getPick('hunger'),emotions=getPicks('emotion'),emotion=emotions[0];
  if(!hunger||!emotions.length){$('m-err').style.display='block';return;}
  const name=($('m-name').value||'').trim()||'Приём пищи';
  const kcalRaw=$('m-kcal').value;
  const calories=kcalRaw===''?null:Math.max(0,parseInt(kcalRaw,10)||0);
  const gnum=id=>{var x=$(id)?$(id).value:'';return x===''?null:Math.max(0,parseInt(x,10)||0);};
  const protein=gnum('m-prot'),fat=gnum('m-fat'),carbs=gnum('m-carb');
  const note=($('m-note')&&$('m-note').value?$('m-note').value.trim():'')||null;
  const intensity=getPick('intensity')||'mid';
  if(editingId){
    const e=state.entries.find(x=>x.id===editingId);
    Object.assign(e,{name,calories,protein,fat,carbs,emotion,emotions,intensity,hunger,note});
    apiDel(e.id);apiPost(e);
  }else{
    const e={id:uid(),ts:tsFrom(getPick('mday'),$('m-time')?$('m-time').value:''),type:'meal',name,calories,protein,fat,carbs,emotion,emotions,intensity,hunger,note};
    state.entries.push(e);apiPost(e);
  }
  save();closeModal();render();haptic();
}

/* ---- stop-kran ---- */
function openStop(){
  openModal(`
    <h3>Стоп-кран</h3><p class="lead">Что сейчас происходит?</p>
    <div class="big-choice">
      <button class="bc1" onclick="stopBefore()"><b>Ещё не начал(а)</b><small>Тянет поесть, но пока держусь</small></button>
      <button class="bc2" onclick="stopDuring()"><b>Уже ем</b><small>За столом, на празднике — уже началось</small></button>
    </div>
    <div class="sheet-actions"><button class="b-ghost" style="flex:1;margin-top:14px" onclick="closeModal()">Закрыть</button></div>`);
}
function stopBefore(){
  openModal(`
    <h3>Пауза</h3><p class="lead">Побудь тут пару минут. Волна спадёт сама.</p>
    <div class="pause"><div class="breathe"></div><p>Вдох… и медленный выдох.<br>Это чувство пройдёт и без еды.</p></div>
    <div class="field"><label>Что чувствуешь?</label>${chipset(DATA.emotions,'emotion',false,true)}</div>
    <div class="field"><label>Насколько сильно</label>${chipset(DATA.intensities,'intensity')}</div>
    <div class="err" id="s-err">Отметь эмоцию.</div>
    <div class="big-choice">
      <button class="bc1" onclick="stopResisted()"><b>Переждал(а), не ем 🌿</b><small>+${DATA.pointsRules.urgeResisted} баллов за осознанность</small></button>
      <button class="bc2" onclick="stopEatAnyway()"><b>Всё равно поем</b><small>Осознанно — перейти к записи еды</small></button>
    </div>`);
  preselect('intensity','high');
}
function stopResisted(){
  const emotions=getPicks('emotion'),emotion=emotions[0];if(!emotions.length){$('s-err').style.display='block';return;}
  const e={id:uid(),ts:Date.now(),type:'urge',subtype:'before',outcome:'resisted',emotion,emotions,intensity:getPick('intensity')||'high',context:null};
  state.entries.push(e);apiPost(e);
  save();closeModal();render();haptic();
}
function stopEatAnyway(){
  const emotions=getPicks('emotion');const intensity=getPick('intensity')||'mid';
  closeModal();
  openMeal({emotions,intensity,hunger:'craving'});
}
function stopDuring(){
  openModal(`
    <h3>Уже ем</h3><p class="lead">Без осуждения — просто заметим, что происходит.</p>
    <div class="field"><label>Что чувствуешь?</label>${chipset(DATA.emotions,'emotion',false,true)}</div>
    <div class="field"><label>Насколько сильно</label>${chipset(DATA.intensities,'intensity')}</div>
    <div class="field"><label>Что происходит</label>
      <div class="chipset" data-group="context">
        ${['Застолье','Праздник','Стресс','Скука','За компанию'].map(c=>`<button type="button" class="ch" data-val="${c}" onclick="pick(this)">${c}</button>`).join('')}
      </div></div>
    <div class="err" id="d-err">Отметь эмоцию.</div>
    <div class="sheet-actions">
      <button class="b-ghost" onclick="closeModal()">Отмена</button>
      <button class="b-primary" onclick="saveDuring()">Отметить эпизод</button>
    </div>`);
}
function saveDuring(){
  const emotions=getPicks('emotion'),emotion=emotions[0];if(!emotions.length){$('d-err').style.display='block';return;}
  const e={id:uid(),ts:Date.now(),type:'urge',subtype:'during',outcome:'logged',emotion,emotions,intensity:getPick('intensity')||'mid',context:getPick('context')};
  state.entries.push(e);apiPost(e);
  save();closeModal();render();haptic();
}

/* ---- activity ---- */
function openActivity(){
  openModal(`
    <h3>Добавить активность</h3><p class="lead">Движение — тоже забота о себе.</p>
    <div class="field"><label>Что делал(а)</label>${chipset(DATA.activityTypes,'act')}</div>
    <div class="field"><label>Сколько минут (или оставь пусто для шагов)</label><input type="number" id="a-min" inputmode="numeric" placeholder="например, 30"></div>
    <div class="field"><label>Шаги (по желанию)</label><input type="number" id="a-steps" inputmode="numeric" placeholder="например, 8000"></div>
    <div class="field"><label>Калории потрачено (по желанию)</label><input type="number" id="a-burn" inputmode="numeric" placeholder="если пусто — оценит бот"></div>
    <div class="field"><label>Когда</label>
      <div class="chipset" data-group="aday" style="margin-bottom:8px">
        <button type="button" class="ch sel" data-val="today" onclick="pick(this)">Сегодня</button>
        <button type="button" class="ch" data-val="yesterday" onclick="pick(this)">Вчера</button>
      </div>
      <input type="time" id="a-time" value="${nowHHMM()}"></div>
    <div class="err" id="a-err">Выбери тип и укажи минуты или шаги.</div>
    <div class="sheet-actions">
      <button class="b-ghost" onclick="closeModal()">Отмена</button>
      <button class="b-lime" onclick="saveActivity()">Сохранить</button>
    </div>`);
}
function saveActivity(){
  const at=getPick('act');
  const min=parseInt($('a-min').value,10)||0;
  const steps=parseInt($('a-steps').value,10)||0;
  const burned=parseInt($('a-burn').value,10)||0;
  if(!at||(min<=0&&steps<=0)){$('a-err').style.display='block';return;}
  const e={id:uid(),ts:tsFrom(getPick('aday'),$('a-time')?$('a-time').value:''),type:'activity',activityType:at,minutes:min};
  if(steps>0)e.steps=steps; if(burned>0)e.burned=burned;
  state.entries.push(e);apiPost(e);
  save();closeModal();render();haptic();
}

/* ================= BOOT ================= */
function showFallback(){
  $('app').innerHTML=`<div class="fallback"><div class="ic">🌿</div>
    <h3>Не удалось загрузить данные</h3>
    <p>Файл data.json не подгрузился. Проверь, что он лежит рядом и открыт через сервер (не с диска).</p>
    <button onclick="boot()">Попробовать снова</button></div>`;
  $('nav').style.display='none';$('actionbar').style.display='none';
}
function syncFromServer(){
  fetch(API+'/entries?t='+Date.now()).then(function(r){return r.ok?r.json():[];}).then(function(list){
    if(!Array.isArray(list))return;
    var have={};state.entries.forEach(function(e){have[e.id]=1;});
    var del={};(state.deleted||[]).forEach(function(id){del[id]=1;});
    var added=0;
    list.forEach(function(e){if(e&&e.id&&!have[e.id]&&!del[e.id]){state.entries.push(e);added++;}});
    if(added){save();render();}
  }).catch(function(){});
}
function boot(){
  fetch('data.json?v='+Date.now())
    .then(r=>{if(!r.ok)throw new Error('http');return r.json();})
    .then(d=>{
      DATA=d;
      let loaded=null;try{loaded=JSON.parse(localStorage.getItem(KEY));}catch(e){}
      if(loaded&&loaded.entries&&loaded.protocol){state=loaded;}else{seed();}
      if(!state.protocol)state.protocol=Object.assign({},DATA.fastingProtocol);
      tipIndex=Math.floor(Math.random()*DATA.tips.length);
      $('nav').style.display='flex';
      render();
      syncFromServer();
      setInterval(()=>{if(tab==='today'||tab==='progress')render();},60000);
      setInterval(syncFromServer,30000);
    })
    .catch(()=>showFallback());
}
boot();
</script>
</body>
</html>
